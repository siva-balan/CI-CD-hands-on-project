<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Simple Website</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial; background: #f4f4f4; margin: 0; }
    header, footer { background: #333; color: white; padding: 10px; text-align: center; }
    nav { background: #444; overflow: hidden; }
    nav a { float: left; color: white; padding: 14px; text-decoration: none; }
    section { padding: 20px; }
    nav a:hover { background: #555; }
  </style>
</head>
<body>
  <header><h1>Welcome to My Website</h1></header>
  <nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </nav>
  <section id="home"><h2>Home</h2><p>Simple website deployed with CI/CD!</p></section>
  <section id="about"><h2>About</h2><p>This is an HTML-only static site.</p></section>
  <section id="contact"><h2>Contact</h2><p>Email: contact@example.com</p></section>
  <footer>© 2025 My Website</footer>
</body>
</html>
